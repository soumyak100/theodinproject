<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div id="content-area">
      <div id="calculator-container">
        <input type="text" id="output-box" disabled />
        <div id="btns-container">
          <div id="btn-num-container">
            <div class="btn-row">
              <button class="btn-num">7</button>
              <button class="btn-num">8</button>
              <button class="btn-num">9</button>
              <button class="btn-op">/</button>
            </div>
            <div class="btn-row">
              <button class="btn-num">4</button>
              <button class="btn-num">5</button>
              <button class="btn-num">6</button>
              <button class="btn-op">*</button>
            </div>
            <div class="btn-row">
              <button class="btn-num">1</button>
              <button class="btn-num">2</button>
              <button class="btn-num">3</button>
              <button class="btn-op">-</button>
            </div>
            <div class="btn-row">
              <button class="btn-num">0</button>
              <button class="btn-op" disabled>.</button>
              <button class="btn-op">=</button>
              <button class="btn-op">+</button>
            </div>
          </div>
          <div id="btn-clear-container">
            <button id="btn-clear">C</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
